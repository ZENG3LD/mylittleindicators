[package]
name = "mylittleindicators"
version = "0.1.0"
edition = "2021"
description = "Technical indicators library — 480+ indicators across 23 categories. Extracted from mylittlechart for cross-project sharing (mylittlequant, mylittlechart)."
license = "MIT"

[dependencies]
digdigdig3 = "=0.3.8"
async-trait = "0.1"
once_cell = "1.21"
arrayvec = "0.7"
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

# Codegen-only: TokenStream support for StrategySpec::extra_decls. Lightweight
# (no proc-macro infrastructure). Used only by mlq-strategies-codegen and
# similar users; chart/alerts code can drop it as a feature.
proc-macro2 = "1"

# Local development: point dig3 pin to the local path.
# When mli is consumed as a published crate, this section is stripped or
# overridden by the downstream Cargo.toml (mli's published Cargo.toml will not
# contain a patch section — only the version pin in [dependencies] above).
[patch.crates-io]
digdigdig3 = { path = "../digdigdig3/crates/digdigdig3" }
